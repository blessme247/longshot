name = "longshot-worker"
main = "src/index.ts"
compatibility_date = "2026-07-01"
compatibility_flags = ["nodejs_compat"]

[triggers]
# Baseline every 5 min plus per-minute precision inside the final's action
# window (Spain v Argentina: kickoff 19:00 UTC, commit ~19:03, FT ~20:50).
# The dated lines are inert after July 19.
crons = [
  "*/5 * * * *",
  "55-59 18 19 7 *",
  "0-15 19 19 7 *",
  "30-59 20 19 7 *",
  "0-30 21 19 7 *",
]

[vars]
TXLINE_BASE_URL = "https://txline.txodds.com"
RPC_URL = "https://solana-rpc.publicnode.com"
ALLOWED_ORIGINS = "https://longshot-web.kamigo.workers.dev,http://localhost:5173,http://localhost:5183"

[[kv_namespaces]]
binding = "PICKS"
id = "0beb856470204cc0ad59be2bfa4d908c"

[observability]
enabled = true
